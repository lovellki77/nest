    if (!newLabel) return;
    const trimmed = newLabel.trim();
    if (!trimmed) {
        showNote('标签名称不能为空', 'warning');
        return;
    }

    if (emojiLabels.includes(trimmed)) {
        showNote('标签已存在', 'warning');
        return;
    }

    try {
        const canvas = document.createElement('canvas');
        canvas.width = 1;
        canvas.height = 1;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 1, 1);
        const placeholderImage = canvas.toDataURL('image/png');

        await saveEmojiToDB(trimmed, placeholderImage, '__placeholder__');
        emojiLabels.push(trimmed);
        currentEmojiLabel = trimmed;

        await refreshEmojiPicker();
        showNote(`标签「${trimmed}」已创建，上传表情即可开始使用`, 'success');
    } catch (err) {
        console.error('创建标签失败:', err);
        showNote('创建标签失败，请重试', 'error');

async function renameLabel(oldLabel, newLabel) {
    if (oldLabel === newLabel) return;
    if (emojiLabels.includes(newLabel)) {
        showNote('标签已存在', 'warning');
        return;
    }
    try {
        const allEmojis = await getAllEmojis();
        const toUpdate = allEmojis.filter(e => (e.label || '默认') === oldLabel);
        if (toUpdate.length === 0) {
            showNote('没有找到该标签的表情', 'warning');
            return;
        }
        const db = await openDB();
        const tx = db.transaction(EMOJI_STORE, 'readwrite');
        const store = tx.objectStore(EMOJI_STORE);
        for (const emoji of toUpdate) {
            emoji.label = newLabel;
            store.put(emoji);
        }
        await new Promise((resolve, reject) => {
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
        const idx = emojiLabels.indexOf(oldLabel);
        if (idx !== -1) emojiLabels[idx] = newLabel;
        if (currentEmojiLabel === oldLabel) currentEmojiLabel = newLabel;
        await refreshEmojiPicker();
        showNote(`标签已重命名为「${newLabel}」`, 'success');
        closeLabelManager(); // 关闭管理弹窗
    } catch (err) {
        console.error(err);
        showNote('重命名失败', 'error');
    }
}
async function deleteLabel(label) {
    try {
        const allEmojis = await getAllEmojis();
        const toDelete = allEmojis.filter(e => (e.label || '默认') === label);
        if (toDelete.length === 0) {
            showNote('没有找到该标签的表情', 'warning');
            return;
        }
        const db = await openDB();
        const tx = db.transaction(EMOJI_STORE, 'readwrite');
        const store = tx.objectStore(EMOJI_STORE);
        for (const emoji of toDelete) {
            store.delete(emoji.id);
        }
        await new Promise((resolve, reject) => {
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
        // 更新内存
        const idx = emojiLabels.indexOf(label);
        if (idx !== -1) emojiLabels.splice(idx, 1);
        if (currentEmojiLabel === label) {
            currentEmojiLabel = emojiLabels.length > 0 ? emojiLabels[0] : '默认';
        }
        await refreshEmojiPicker();
        showNote(`标签「${label}」已删除`, 'success');
        closeLabelManager();
    } catch (err) {
        console.error(err);
        showNote('删除失败', 'error');
    }
}

    async function handleEmojiUpload(files) {
    if (!files || files.length === 0) return;
    
    // 将 FileList 转换为数组，方便操作
    const fileArray = Array.from(files);
    const total = fileArray.length;
    console.log(`📎 选择了 ${total} 个文件:`, fileArray.map(f => f.name));

    const label = document.getElementById('emojiLabelSelect').value || '默认';
    let successCount = 0;
    let failCount = 0;
    const failedFiles = [];

    // 显示进度
    showProgressNote(`⏳ 准备上传 ${total} 张图片...`);

    // 禁用按钮
    const uploadBtn = document.getElementById('emojiUploadBtn');
    if (uploadBtn) uploadBtn.style.opacity = '0.5';
    const fileInput = document.getElementById('emojiFileInput');
    if (fileInput) fileInput.disabled = true;

    // 逐文件处理（确保每个文件完全处理完再处理下一个）
    for (let i = 0; i < fileArray.length; i++) {
        const file = fileArray[i];
        const currentNum = i + 1;
        
        console.log(`📌 [${currentNum}/${total}] 开始处理: ${file.name}, 大小: ${(file.size / 1024).toFixed(1)}KB`);
        showProgressNote(`⏳ 正在处理第 ${currentNum}/${total} 张`);

        // 检查大小
        if (file.size > 5 * 1024 * 1024) {
            failCount++;
            failedFiles.push(`${file.name} (超过5MB)`);
            console.warn(`⚠️ [${currentNum}/${total}] ${file.name} 超过 5MB，已跳过`);
            continue;
        }

        try {
            console.log(`🔄 [${currentNum}/${total}] 开始压缩: ${file.name}`);
            const compressed = await compressEmojiImage(file, 200);
            console.log(`✅ [${currentNum}/${total}] 压缩完成，数据长度: ${compressed.length}`);

            console.log(`💾 [${currentNum}/${total}] 保存到 IndexedDB: ${file.name}`);
            await saveEmojiToDB(label, compressed, file.name);
            successCount++;
            console.log(`✅ [${currentNum}/${total}] 上传成功：${file.name}`);

            // 立即刷新网格
            console.log(`🔄 [${currentNum}/${total}] 刷新网格...`);
            await refreshEmojiPicker();
            console.log(`✅ [${currentNum}/${total}] 网格已刷新`);
        } catch (err) {
            failCount++;
            const errorMsg = err.message || '未知错误';
            failedFiles.push(`${file.name} (${errorMsg})`);
            console.error(`❌ [${currentNum}/${total}] 上传失败：${file.name}`, err);
        }
    }

    // 恢复按钮
    if (uploadBtn) uploadBtn.style.opacity = '1';
    if (fileInput) fileInput.disabled = false;
    if (fileInput) fileInput.value = '';

    // 最终刷新
    await refreshEmojiPicker();
    hideProgressNote();

    // 显示结果
    let msg = '';
    if (successCount > 0 && failCount === 0) {
        msg = `✅ 成功上传 ${successCount} 个表情`;
    } else if (successCount > 0 && failCount > 0) {
        const failedNames = failedFiles.slice(0, 3).join('、');
        const more = failedFiles.length > 3 ? ` 等${failedFiles.length}个` : '';
        msg = `⚠️ 成功 ${successCount} 个，失败 ${failCount} 个（${failedNames}${more}）`;
    } else {
        msg = `❌ 全部上传失败: ${failedFiles.join('、')}`;
    }
    showNote(msg, failCount > 0 && successCount === 0 ? 'error' : (failCount > 0 ? 'warning' : 'success'));

    console.log(`🏁 上传完成: 成功 ${successCount}, 失败 ${failCount}`);
}

    function setSetting(path, value) {
        var keys = path.split('.'); var obj = state;
        for (var i = 0; i < keys.length - 1; i++) { obj = obj[keys[i]]; }
        obj[keys[keys.length - 1]] = value;
        saveState();
        if (path === 'settings.darkMode') { applyDarkMode(value); }
        refreshAffectedUI(path);
    }

    function refreshAffectedUI(path) {
        if (path === 'settings.fontSize' && chatLoader) chatLoader.refresh();
        else if (path === 'settings.showReadReceipt' && chatLoader) chatLoader.refresh();
        else if (path === 'settings.showTyping') {}
        else if (path.startsWith('settings.autoMessage')) restartAutoMessage();
    }

    function updateRangeSetting(slider) {
        var key = slider.getAttribute('data-key');
        var val = parseInt(slider.value);
        setSetting('settings.' + key, val);
        var label = document.getElementById(key + 'Label');
        if (label) {
            var formatter = key === 'autoMessageMin' || key === 'autoMessageMax' ? v => formatDelay(v * 60) : formatDelay;
            label.textContent = formatter(val);
        }
        if (key === 'fontSize') { document.getElementById('fontSizeVal').textContent = val + 'px'; }
        if (key === 'minReplyDelay' && val > state.settings.maxReplyDelay) {
            state.settings.maxReplyDelay = val;
            var maxSlider = document.querySelector('input[data-key="maxReplyDelay"]');
            if (maxSlider) maxSlider.value = val;
            var maxLabel = document.getElementById('maxReplyDelayLabel');
            if (maxLabel) maxLabel.textContent = formatDelay(val);
        }
        if (key === 'maxReplyDelay' && val < state.settings.minReplyDelay) {
            state.settings.minReplyDelay = val;
            var minSlider = document.querySelector('input[data-key="minReplyDelay"]');
            if (minSlider) minSlider.value = val;
            var minLabel = document.getElementById('minReplyDelayLabel');
            if (minLabel) minLabel.textContent = formatDelay(val);
        }
        if (key === 'autoMessageMin' && val > state.settings.autoMessageMax) {
            state.settings.autoMessageMax = val;
            var amaxSlider = document.querySelector('input[data-key="autoMessageMax"]');
            if (amaxSlider) amaxSlider.value = val;
            var amaxLabel = document.getElementById('autoMessageMaxLabel');
            if (amaxLabel) amaxLabel.textContent = formatDelay(val * 60);
        }
        if (key === 'autoMessageMax' && val < state.settings.autoMessageMin) {
            state.settings.autoMessageMin = val;
            var aminSlider = document.querySelector('input[data-key="autoMessageMin"]');
            if (aminSlider) aminSlider.value = val;
            var aminLabel = document.getElementById('autoMessageMinLabel');
            if (aminLabel) aminLabel.textContent = formatDelay(val * 60);
        }
    }

    function stepRange(target) {
        var key = target.getAttribute('data-key');
        var delta = parseInt(target.getAttribute('data-delta'));
        var slider = document.querySelector(`input[data-key="${key}"]`);
        if (!slider) return;
        var newVal = parseInt(slider.value) + delta;
        newVal = Math.min(parseInt(slider.max), Math.max(parseInt(slider.min), newVal));
        slider.value = newVal;
        updateRangeSetting(slider);
    }

            showNote('步数已重置', 'success');
        }
    };

    function accumulateSteps(count) {
        if (!count || count <= 0) return;
        const today = new Date().toDateString();
        if (state.stepsDate !== today) { state.steps = 0; state.stepsDate = today; }
        state.steps += count;
        updateStepsUI();
        saveState();
    }

    let stepCounterRunning = false;
    let lastStepTime = 0;
    let lastAccelMag = 0;
    let stepDebug = true;

    function startStepCounter() {
        if (stepCounterRunning) { console.log('计步已在运行'); return; }
        if (!window.DeviceMotionEvent) { showNote('当前浏览器不支持计步', 'error'); return; }

        const permissionGranted = localStorage.getItem('devicemotion_permission') === 'true';
        if (permissionGranted) {
            window.addEventListener('devicemotion', handleMotion);
            stepCounterRunning = true;
            if (stepDebug) console.log('计步监听已启动 (已授权)');
            return;
        }

        const requestPermission = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        console.log('权限状态:', state);
                        if (state === 'granted') {
                            localStorage.setItem('devicemotion_permission', 'true');
                            window.addEventListener('devicemotion', handleMotion);
                            stepCounterRunning = true;
                            showNote('计步已开启 ✅', 'success');
                            if (stepDebug) console.log('计步监听已启动');
                        } else { showNote('需要允许运动传感器权限', 'warning'); }
                    })
                    .catch(err => { console.error('权限请求失败:', err); showNote('无法获取计步权限', 'error'); });
            } else {
                window.addEventListener('devicemotion', handleMotion);
                stepCounterRunning = true;
                showNote('计步已开启 ✅', 'success');
                if (stepDebug) console.log('计步监听已启动 (无权限要求)');
            }
        };

        const stepCard = document.getElementById('stepDisplay')?.closest('.card') || 
                         document.querySelector('.card[onclick*="openStepModal"]');
        
        if (stepCard) {
            const gestureHandler = function(e) {
                stepCard.removeEventListener('click', gestureHandler);
                stepCard.removeEventListener('touchstart', gestureHandler);
                requestPermission();
            };
            stepCard.addEventListener('click', gestureHandler, { once: true });
            stepCard.addEventListener('touchstart', gestureHandler, { once: true });
            showNote('点击步数卡片开启计步', 'info');
        } else {
            const gestureHandler = function(e) {
                document.removeEventListener('click', gestureHandler);
                document.removeEventListener('touchstart', gestureHandler);
                requestPermission();
            };
            document.addEventListener('click', gestureHandler, { once: true });
            document.addEventListener('touchstart', gestureHandler, { once: true });
            showNote('点击屏幕任意位置开启计步', 'info');
        }
    }

    function handleMotion(event) {
        const acc = event.accelerationIncludingGravity;
        if (!acc) { if (stepDebug) console.warn('无加速度数据'); return; }
        const x = acc.x || 0, y = acc.y || 0, z = acc.z || 0;
        const mag = Math.sqrt(x*x + y*y + z*z);
        const now = Date.now();
        if (stepDebug && now - (window._lastMagLog || 0) > 10000) {
            window._lastMagLog = now;
            console.log(`加速度模值: ${mag.toFixed(2)}, 步数: ${state.steps}`);
        }
        const STEP_THRESHOLD = 11.0;
        const MIN_INTERVAL = 200;
        if (mag > STEP_THRESHOLD && Math.abs(mag - lastAccelMag) > 0.8 && (now - lastStepTime) > MIN_INTERVAL) {
            accumulateSteps(1);
            lastStepTime = now;
            lastAccelMag = mag;
            if (stepDebug) console.log(`✅ 检测到一步，当前步数: ${state.steps}`);
        } else { lastAccelMag = mag * 0.15 + lastAccelMag * 0.85; }
    }

    // ===================== 自动消息 =====================
    function scheduleAutoMessage() {
    // 清除已有定时器，防止堆积
    if (autoMsgTimer) {
        clearTimeout(autoMsgTimer);
        autoMsgTimer = null;
    }
    // 如果功能关闭，直接返回
    if (!state.settings.autoMessageEnabled) return;

    var min = Math.max(1, state.settings.autoMessageMin || 5);
    var max = Math.max(min, state.settings.autoMessageMax || 15);
    var delayMinutes = min + Math.random() * (max - min);

    autoMsgTimer = setTimeout(async function() {
        // 关键修复：定时器触发时再次检查开关状态
        if (!state.settings.autoMessageEnabled) {
            autoMsgTimer = null;
            return;
        }

        var onlinePartners = state.partners.filter(p => p.online);
        if (onlinePartners.length === 0) {
            // 没有在线伴侣，稍后重试
            scheduleAutoMessage();
            return;
        }

        var randomPartner = onlinePartners[Math.floor(Math.random() * onlinePartners.length)];
        const replyContent = await generateReplyContent(randomPartner.id);

        if (replyContent) {
            const replyMsg = { sender: randomPartner.id, timestamp: Date.now(), ...replyContent };
            const replyId = await saveMessageToDB(randomPartner.id, replyMsg);
            replyMsg.id = replyId;

            if (randomPartner.id === state.currentPartnerId && chatLoader) {
                chatLoader.appendMessage(replyMsg);
                if (!document.getElementById('chatScreen').classList.contains('hidden')) {
                    clearUnread();
                }
            }
            saveState();
            updateBadge();
        }

        // 递归调度下一次（会再次经过开关检查）
        scheduleAutoMessage();
    }, delayMinutes * 60 * 1000);
}

function restartAutoMessage() {
    // 先清除，再调度
    if (autoMsgTimer) {
        clearTimeout(autoMsgTimer);
        autoMsgTimer = null;
    }
    scheduleAutoMessage();
}

    // ===================== 伴侣上线后自动回复离线留言 =====================
    async function replyToOfflineMessages(partnerId) {
        if (isResetting) return;
        if (!state.wordCards.length) return;

        const msgs = await loadMessagesFromDB(partnerId, 9999, 0);
        if (!msgs || msgs.length === 0) return;

        let lastUserMsgTime = null;
        for (let i = msgs.length - 1; i >= 0; i--) {
            if (msgs[i].sender === 'user') {
                lastUserMsgTime = msgs[i].timestamp;
                break;
            }
        }
        if (!lastUserMsgTime) return;

        let hasReplyAfter = false;
        for (let i = msgs.length - 1; i >= 0; i--) {
            if (msgs[i].sender === partnerId && msgs[i].timestamp > lastUserMsgTime) {
                hasReplyAfter = true;
                break;
            }
        }
        if (hasReplyAfter) return;

        const count = Math.random() < 0.7 ? 1 : (Math.random() < 0.9 ? 2 : 3);
        let replyCount = 0;
        for (let k = 0; k < count; k++) {
            const replyContent = await generateReplyContent(partnerId);
            if (replyContent) {
                const replyMsg = { sender: partnerId, timestamp: Date.now() + k * 1000, ...replyContent };
                const savedId = await saveMessageToDB(partnerId, replyMsg);
                replyMsg.id = savedId;
                replyCount++;
                if (state.currentPartnerId === partnerId && chatLoader) {
                    chatLoader.appendMessage(replyMsg);
                    chatLoader.scrollToBottom();
                }
            }
        }
        if (replyCount > 0) {
            updateBadge();
            saveState();
            console.log(`📩 伴侣 ${partnerId} 上线，自动回复了 ${replyCount} 条离线留言`);
        }
    }

    function startAutoOnlineToggle() {
        function randomToggle() {
            if (isResetting) return;
            var changed = false;
            var shuffled = state.partners.slice().sort(() => 0.5 - Math.random());
            var probability = (1 + Math.random() * 4) / 100;
            for (var i = 0; i < shuffled.length; i++) {
                if (Math.random() < probability) {
                    var wasOffline = !shuffled[i].online;
                    shuffled[i].online = !shuffled[i].online;
                    changed = true;
                    if (wasOffline && shuffled[i].online) {
                        replyToOfflineMessages(shuffled[i].id);
                    }
                }
            }
            if (changed) {
                saveState();
                updatePartnerStatusesInUI();
                if (!document.getElementById('chatScreen').classList.contains('hidden')) updateBadge();

            setTimeout(randomToggle, 1800000 + Math.random() * 1800000);

    }

    function fetchAndUpdateWeather() {
        var cache = safeGet(STORAGE_KEYS.WEATHER_CACHE);
        if (cache) {
            try { var cached = JSON.parse(cache); if (Date.now() - cached.timestamp < 30 * 60 * 1000) { updateWeatherWidget(cached.temp, cached.icon, cached.desc); return; } } catch(e) {}
        }
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => loadWeather(pos.coords.latitude, pos.coords.longitude), () => loadWeather(39.9042, 116.4074));
        } else { loadWeather(39.9042, 116.4074); }
    }

    function loadWeather(lat, lon) {
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`)
            .then(r => r.json())
            .then(data => {
                var temp = Math.round(data.current_weather.temperature);
                var code = data.current_weather.weathercode ?? data.current_weather.weather_code ?? 0;
                var icon = getWeatherIcon(code);
                var desc = getWeatherDesc(code);
                var cache = { timestamp: Date.now(), temp, icon, desc };
                safeSet(STORAGE_KEYS.WEATHER_CACHE, JSON.stringify(cache));
                updateWeatherWidget(temp, icon, desc);
            })
            .catch(() => updateWeatherWidget('--', 'fa-cloud', '未知'));
    }

    function getWeatherIcon(code) {
        if (code === 0) return 'fa-sun';
        if (code <= 3) return 'fa-cloud-sun';
        if (code <= 19) return 'fa-cloud';
        if (code <= 29) return 'fa-cloud';
        if (code <= 39) return 'fa-cloud';
        if (code <= 49) return 'fa-smog';
        if (code <= 59) return 'fa-cloud-drizzle';
        if (code <= 69) return 'fa-cloud-rain';
        if (code <= 79) return 'fa-snowflake';
        if (code <= 82) return 'fa-cloud-showers-heavy';
        if (code <= 86) return 'fa-snowman';
        if (code <= 94) return 'fa-bolt';
        if (code <= 99) return 'fa-bolt';
        return 'fa-cloud';
    }

    function getWeatherDesc(code) {
        if (code === 0) return '晴';
        if (code === 1) return '少云';
        if (code === 2) return '多云';
        if (code === 3) return '阴';
        if (code <= 9) return '雾霾';
        if (code <= 19) return '沙尘';
        if (code <= 29) return '尘暴';
        if (code <= 39) return '吹雪';
        if (code <= 49) return '雾';
        if (code <= 59) return '毛毛雨';
        if (code <= 69) return '雨';
        if (code <= 79) return '雪';
        if (code <= 82) return '阵雨';
        if (code <= 86) return '阵雪';
        if (code <= 90) return '冰雹';
        if (code <= 94) return '雷暴' + (code % 2 === 0 ? '伴雨' : '伴雪');
        if (code <= 99) return '强雷暴';
        return '未知';
    }

    function updateWeatherWidget(temp, icon, desc) {
        var widget = document.getElementById('weatherWidget');
        if (!widget) return;
        widget.innerHTML = `<div style="font-size:10px;color:var(--text-muted);">WEATHER</div><div style="font-size:32px;color:var(--accent);"><i class="fa-solid ${icon}"></i></div><div style="font-size:14px;">${temp}° ${desc}</div>`;

    modal.className = 'modal-content';
    modal.style.maxWidth = '400px';
    modal.style.maxHeight = '70vh';
    modal.style.overflow = 'hidden';
    modal.style.display = 'flex';
    modal.style.flexDirection = 'column';

    // 标题
    const title = document.createElement('div');
    title.className = 'modal-title';
    title.innerHTML = `<i class="fa-solid fa-hand-peace"></i> 选择拍一拍动作`;
    modal.appendChild(title);

    // 选项列表容器
    const listContainer = document.createElement('div');
    listContainer.style.cssText = 'flex:1;overflow-y:auto;padding:4px 0;margin-bottom:12px;';
    listContainer.style.scrollbarWidth = 'none';
    listContainer.style.msOverflowStyle = 'none';

    // 生成选项列表
    pokePool.forEach(function(pokeText, index) {
        const item = document.createElement('div');
        item.style.cssText = `
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            margin-bottom: 6px;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s ease;
        `;
        item.innerHTML = `
            <span style="font-size:14px;color:var(--text-primary);">${escapeHTML(pokeText)}</span>
            <span style="font-size:12px;color:var(--text-secondary);opacity:0.5;"><i class="fa-solid fa-chevron-right"></i></span>
        `;
        
        // 悬停效果
        item.addEventListener('mouseenter', function() {
            this.style.borderColor = 'var(--accent)';
            this.style.background = 'var(--accent-bg)';
            this.style.transform = 'translateX(4px)';
        });
        item.addEventListener('mouseleave', function() {
            this.style.borderColor = 'var(--border-light)';
            this.style.background = 'var(--bg-primary)';
            this.style.transform = 'translateX(0)';
        });
        
        // 点击选择
        item.addEventListener('click', function() {
            document.body.removeChild(overlay);
            sendPokeMessage(pokeText, partner);
        });
        
        listContainer.appendChild(item);
    });

    modal.appendChild(listContainer);

    // 底部按钮
    const buttons = document.createElement('div');
    buttons.className = 'modal-buttons';
    buttons.innerHTML = `
        <button class="modal-btn modal-btn-secondary" id="cancelPokeBtn">取消</button>
        <button class="modal-btn modal-btn-primary" id="randomPokeBtn"><i class="fa-solid fa-shuffle"></i> 随机发送</button>
    `;
    modal.appendChild(buttons);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    // 点击背景关闭
    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
            document.body.removeChild(overlay);
        }
    });

    // 取消按钮
    document.getElementById('cancelPokeBtn').addEventListener('click', function() {
        document.body.removeChild(overlay);
    });

    // 随机发送按钮
    document.getElementById('randomPokeBtn').addEventListener('click', function() {
        const randomPoke = pokePool[Math.floor(Math.random() * pokePool.length)];
        document.body.removeChild(overlay);
        sendPokeMessage(randomPoke, partner);
    });

    // ESC 键关闭
    const escHandler = function(e) {
        if (e.key === 'Escape') {
            document.body.removeChild(overlay);
            document.removeEventListener('keydown', escHandler);
        }
    };
    document.addEventListener('keydown', escHandler);
}

// ===== 发送拍一拍消息（独立函数） =====
function sendPokeMessage(pokeText, partner) {
    const pokeMsg = `✦ ${state.user.name || '我'} ${pokeText} ✦`;
    
    if (chatLoader) {
        const systemMsg = {
            id: Date.now(),
            sender: 'system',
            text: pokeMsg,
            timestamp: Date.now(),
            type: 'system',
            isPoke: true
        };
        chatLoader.appendMessage(systemMsg);
        chatLoader.scrollToBottom();
        saveMessageToDB(state.currentPartnerId, systemMsg).catch(function(err) {
            console.error('保存拍一拍消息失败:', err);
        });
    } else {
        showNote(pokeMsg, 'info', 3000);
    }

    showNote(`已 ${pokeText} ✦`, 'success', 1500);

    if (partner.online && state.wordCards && state.wordCards.length > 0) {
        const minDelay = (state.settings.minReplyDelay || 1) * 1000;
        const maxDelay = (state.settings.maxReplyDelay || 5) * 1000;
        const delay = minDelay + Math.random() * (maxDelay - minDelay);
        setTimeout(function() {
            simulateReply();
        }, delay);
    }
}

// ==========================================================
    // Service Worker 注册 - 移到 init() 之前
    // ==========================================================
    function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            console.log('[PWA] 浏览器支持 Service Worker');
            navigator.serviceWorker.register('/nest/sw.js', {
                scope: '/nest/'
            })
            .then(function(registration) {
                console.log('[PWA] Service Worker 注册成功!');
                console.log('[PWA] 作用域:', registration.scope);
                registration.addEventListener('updatefound', function() {
                    var newWorker = registration.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            showNote('✨ 新版本已准备好，刷新即可更新', 'success');
                        }
                    });
                });
            })
            .catch(function(error) {
                console.warn('[PWA] Service Worker 注册失败:', error);
            });
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                console.log('[PWA] Service Worker 已接管页面');
            });
        } else {
            console.log('[PWA] 当前浏览器不支持 Service Worker');
        }
    }
    
    function checkPwaMode() {
        var isStandalone = window.navigator.standalone || 
                           window.matchMedia('(display-mode: standalone)').matches;
        if (isStandalone) {
            console.log('[PWA] ✅ 应用在独立模式下运行');
            document.body.classList.add('pwa-mode');
        } else {
            console.log('[PWA] ❌ 应用在浏览器中打开');
        }
    }

    init();
})();
</script>
